name: Deploy plugin integrity manifest

on:
  push:
    branches: [main]
    paths:
      - 'plugin-integrity.json'
      - '.github/workflows/deploy-plugin-integrity.yml'
  workflow_dispatch:

# Yandex Object Storage — S3 API, НЕ AWS.
# Не использовать aws-actions/configure-aws-credentials (лезет в sts.amazonaws.com).

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
    steps:
      - uses: actions/checkout@v4
      - name: Upload to Yandex Object Storage
        run: |
          aws --version
          aws s3 cp plugin-integrity.json \
            "s3://awesomeplugins/AwesomePlugins/plugin-integrity.json" \
            --endpoint-url "https://storage.yandexcloud.net" \
            --content-type "application/json"
