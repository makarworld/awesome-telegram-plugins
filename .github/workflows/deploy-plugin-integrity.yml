name: Deploy plugin integrity manifest

on:
  push:
    branches: [main]
    paths:
      - 'plugin-integrity.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.YC_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws-region: ru-central1
      - run: |
          aws s3 cp plugin-integrity.json \
            s3://awesomeplugins/AwesomePlugins/plugin-integrity.json \
            --endpoint-url https://storage.yandexcloud.net \
            --content-type application/json
